name: Build and Release

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    name: Build tmrx.so
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OSS CAD Suite (provides yosys + yosys-config)
        uses: YosysHQ/setup-oss-cad-suite@v3

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            build-essential \
            git

      - name: Verify yosys-config
        run: yosys-config --version

      - name: Build tmrx plugin
        run: |
          mkdir -p build
          yosys-config --exec --cxx --cxxflags \
            -I$PWD/include \
            --ldflags \
            -shared \
            -o build/tmrx.so \
            src/tmrx.cc \
            src/utils.cc \
            src/tmrx_pass.cc \
            src/mark_pass.cc \
            src/config_manager.cc \
            src/tmrx_logic_expansion.cc \
            src/tmrx_mod_expansion.cc \
            src/tmrx_utils.cc \
            --ldlibs

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmrx.so
          path: build/tmrx.so

  draft-release:
    name: Update draft release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    outputs:
      release_id: ${{ steps.drafter.outputs.id }}
      upload_url: ${{ steps.drafter.outputs.upload_url }}
      tag_name: ${{ steps.drafter.outputs.tag_name }}
    steps:
      - uses: release-drafter/release-drafter@v6
        id: drafter
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-release-asset:
    name: Upload tmrx.so to draft release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build, draft-release]
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: tmrx.so

      - name: Upload tmrx.so to draft release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.draft-release.outputs.upload_url }}
          asset_path: tmrx.so
          asset_name: tmrx.so
          asset_content_type: application/octet-stream
