[global]
# tmr_mode = "FullModuleTMR"
tmr_mode = "LogicTMR"
tmr_voter = "Default"
preserve_module_ports = false
tmr_voter_safe_mode = false
clock_port_names = ["clk_i"]
expand_clock = false
reset_port_names = ["rst_ni"]
expand_reset = false

[global.logic]
insert_voter_before_ff = false
insert_voter_after_ff = true
logic_path_1_suffix = "_a"
logic_path_2_suffix = "_b"
logic_path_3_suffix = "_c"

[global.full_module]
insert_voter_before_modules = true
insert_voter_after_modules = true

[module.tc_sram_impl]
tmr_mode = "FullModuleTMR"
prevent_renaming = true

# ---------------------------------------------------------------------------
# Clock Domain Crossing (CDC) modules
#
# CDC modules require special handling because their internal flip-flops are
# carefully timed to handle metastability.  Applying LogicTMR internally
# would replicate the synchronizer flip-flops and alter their timing, breaking
# the CDC semantics.
#
# Strategy:
#   - "Outermost" CDC boundaries (directly instantiated from non-CDC RTL) are
#     set to FullModuleTMR: three independent CDC paths are created and their
#     outputs are voted.
#   - All nested CDC sub-modules (only ever instantiated inside other CDC
#     modules) are set to None so they are preserved unchanged inside the
#     three FullModuleTMR copies.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Technology clock-cell group.
#
# tc_clk_* are generic clock infrastructure primitives (mux, inverter, gate,
# buffer, …) that map to IHP sg13g2 clock cells.  They operate on clock nets
# and must never be replicated by LogicTMR; any TMR on clock paths is handled
# at the module boundary level, not inside the cell.
# ---------------------------------------------------------------------------
[group.clock_cells]
tmr_mode = "None"
preserve_module_ports = true

# ---------------------------------------------------------------------------
# Clock generation group (None — no TMR).
#
# These modules generate or multiplex clock signals.  FullModuleTMR would
# place a combinational majority voter directly on the clk_o output net,
# which is a design-rule violation: STA tools do not recognise voter outputs
# as clocks, the added gate delay causes skew, and three independent divider
# counters can slip out of phase, producing a glitchy voted clock.
# Clock hardening is better addressed through layout shielding or a
# cold-standby / glitch-free mux strategy, not output voting.
# ---------------------------------------------------------------------------
[group.clock_gen]
tmr_mode = "None"
preserve_module_ports = true

# ---------------------------------------------------------------------------
# Reset generation group (FullModuleTMR).
#
# These modules synchronise or generate the design-wide reset.  Three
# independent reset synchroniser chains with a voter on rst_no is an accepted
# TMR pattern: all three copies deassert in the same clock cycle under normal
# operation, and the voter masks a single-copy fault.
# ---------------------------------------------------------------------------
[group.reset_gen]
tmr_mode = "FullModuleTMR"

# ---------------------------------------------------------------------------
# CDC group definitions.
# ---------------------------------------------------------------------------

# cdc_outermost: directly instantiated from non-CDC RTL.  FullModuleTMR
# creates three independent CDC paths (one per TMR copy) with a voter on the
# outputs.
[group.cdc_outermost]
tmr_mode = "FullModuleTMR"

# cdc_internal: only ever instantiated inside other CDC modules.  Set to None
# with preserved ports so the three FullModuleTMR copies each contain an
# unmodified, timing-safe replica of the synchronizer logic.
#
# sync, cdc_2phase_clearable and their sub-modules must NOT be modified by
# LogicTMR for two reasons:
#   1. Their internal flip-flops are synchronizer stages whose timing must be
#      preserved exactly; LogicTMR would triplicate those FFs and alter timing.
#   2. sync is instantiated inside CDC sub-modules that are also cdc_internal.
#      If sync were FullModuleTMR the original module would be renamed to
#      sync_tmrx_impl, breaking references from those cdc_internal modules.
#
# When a LogicTMR parent (e.g. gpio, clint, uart_rx) instantiates sync, TMRX
# treats it as a "preserver" submodule: it inserts a voter on the input and
# fans the single output to all three triplicated branches.
[group.cdc_internal]
tmr_mode = "None"
preserve_module_ports = true

# ---------------------------------------------------------------------------
# JTAG debug subsystem group.
#
# The riscv-dbg JTAG/DM block is a debug-only path that is not in the
# critical mission data flow.  Applying TMR here would triple the debug
# register space and complicate JTAG operation without meaningful safety
# benefit.  All modules below are therefore set to None.
#
# dmi_cdc is the JTAG↔core CDC bridge; it lives logically inside the debug
# subsystem, so it is assigned here rather than to cdc_outermost.  Removing
# it from the jtag_debug group (by commenting out the section) restores
# cdc_outermost (FullModuleTMR) behaviour for that bridge automatically,
# since a module with no group entry falls back through the precedence chain.
#
# To re-enable TMR on the entire JTAG subsystem, comment out [group.jtag_debug]
# and the `groups = ["jtag_debug"]` assignments below.
# ---------------------------------------------------------------------------
[group.jtag_debug]
tmr_mode = "None"
preserve_module_ports = true

# ---------------------------------------------------------------------------
# Module → group assignments.
# ---------------------------------------------------------------------------

# --- Technology clock cells (None, ports preserved) ---
[module.tc_clk_and2]
groups = ["clock_cells"]

[module.tc_clk_buffer]
groups = ["clock_cells"]

[module.tc_clk_gating]
groups = ["clock_cells"]

[module.tc_clk_inverter]
groups = ["clock_cells"]

[module.tc_clk_mux2]
groups = ["clock_cells"]

[module.tc_clk_xor2]
groups = ["clock_cells"]

[module.tc_clk_or2]
groups = ["clock_cells"]

[module.tc_clk_delay]
groups = ["clock_cells"]

# --- Clock generation (None — voter on clk_o would violate clock rules) ---
[module.clk_int_div]
groups = ["clock_gen"]

[module.clk_int_div_static]
groups = ["clock_gen"]

[module.clk_mux_glitch_free]
groups = ["clock_gen"]

# --- Reset generation (FullModuleTMR) ---
[module.rstgen]
groups = ["reset_gen"]

[module.rstgen_bypass]
groups = ["reset_gen"]

# --- CDC: outermost crossing boundary (FullModuleTMR) ---
# (dmi_cdc is assigned under jtag_debug below; re-assign here if that
#  section is commented out and CDC TMR on the JTAG bridge is desired)

# --- CDC: internal sub-modules (None, ports preserved) ---
[module.sync]
groups = ["cdc_internal"]

[module.sync_wedge]
groups = ["cdc_internal"]

[module.cdc_2phase]
groups = ["cdc_internal"]

[module.cdc_2phase_src]
groups = ["cdc_internal"]

[module.cdc_2phase_dst]
groups = ["cdc_internal"]

[module.cdc_2phase_clearable]
groups = ["cdc_internal"]

[module.cdc_2phase_src_clearable]
groups = ["cdc_internal"]

[module.cdc_2phase_dst_clearable]
groups = ["cdc_internal"]

[module.cdc_4phase]
groups = ["cdc_internal"]

[module.cdc_4phase_src]
groups = ["cdc_internal"]

[module.cdc_4phase_dst]
groups = ["cdc_internal"]

[module.cdc_fifo_2phase]
groups = ["cdc_internal"]

[module.cdc_fifo_gray]
groups = ["cdc_internal"]

[module.cdc_fifo_gray_clearable]
groups = ["cdc_internal"]

[module.cdc_reset_ctrlr]
groups = ["cdc_internal"]

[module.cdc_reset_ctrlr_half]
groups = ["cdc_internal"]

[module.edge_propagator]
groups = ["cdc_internal"]

[module.edge_propagator_ack]
groups = ["cdc_internal"]

[module.edge_propagator_tx]
groups = ["cdc_internal"]

[module.edge_propagator_rx]
groups = ["cdc_internal"]

# --- JTAG debug subsystem (None) ---
# Comment out [group.jtag_debug] above and these assignments to apply global TMR.
[module.dmi_cdc]
groups = ["jtag_debug"]

[module.dmi_jtag]
groups = ["jtag_debug"]

[module.dmi_jtag_tap]
groups = ["jtag_debug"]

[module.dm_top]
groups = ["jtag_debug"]

[module.dm_csrs]
groups = ["jtag_debug"]

[module.dm_mem]
groups = ["jtag_debug"]

[module.dm_sba]
groups = ["jtag_debug"]

[module.dm_obi_top]
groups = ["jtag_debug"]

[module.debug_rom]
groups = ["jtag_debug"]

[module.debug_rom_one_scratch]
groups = ["jtag_debug"]

[module.fifo_v3]
groups = ["jtag_debug"]

[module.croc_chip]
tmr_mode = "None"
preserve_module_ports = true

[module.croc_soc]
preserve_module_ports = true

# IHP IO pad cells are blackboxes (from liberty) so they get FullModuleTMR by
# default from the black_box_module group. Override to None since they are
# boundary cells that must not be triplicated.
[module.sg13g2_IOPadIn]
tmr_mode = "None"

[module.sg13g2_IOPadInOut30mA]
tmr_mode = "None"

[module.sg13g2_IOPadOut16mA]
tmr_mode = "None"

[module.sg13g2_IOPadOut4mA]
tmr_mode = "None"

[module.sg13g2_IOPadVdd]
tmr_mode = "None"

[module.sg13g2_IOPadVss]
tmr_mode = "None"

[module.sg13g2_IOPadIOVdd]
tmr_mode = "None"

[module.sg13g2_IOPadIOVss]
tmr_mode = "None"

[module.sg13g2_mux2_1]
tmr_mode = "None"
preserve_module_ports = true
