# Global configuration
[global]
# tmr_mode = "FullModuleTMR"
tmr_mode = "LogicTMR"
tmr_voter = "Default"
tmr_voter_safe_mode = true
preserve_module_ports = false
insert_voter_before_ff = false
insert_voter_after_ff = true
tmr_mode_full_module_insert_voter_before_modules = true
tmr_mode_full_module_insert_voter_after_modules = true
tmr_mode_full_module_insert_voter_on_clock_nets = false
clock_port_names = ["clk_i"]
expand_clock = false
reset_port_names = ["rst_ni"]
expand_reset = false
ff_cells = ["DFF", "FDRE"]
additional_ff_cells = ["FDCE"]
excluded_ff_cells = ["FDSE"]
logic_path_1_suffix = "_a"
logic_path_2_suffix = "_b"
logic_path_3_suffix = "_c"


[module_submodule]
tmr_mode = "FullModuleTMR"
# tmr_mode = "LogicTMR"
tmr_voter = "Default"
insert_voter_before_ff = false
insert_voter_after_ff = true
tmr_mode_full_module_insert_voter_before_modules = true
tmr_mode_full_module_insert_voter_after_modules = true
clock_port_names = ["clk_i"]
expand_clock = false
reset_port_names = ["rst_ni"]
expand_reset = false
ff_cells = ["DFF", "FDRE"]
additional_ff_cells = ["FDCE"]
excluded_ff_cells = ["FDSE"]
logic_path_1_suffix = "_a"
logic_path_2_suffix = "_b"
logic_path_3_suffix = "_c"


["specific_module_submodule$top.u_sub"]
tmr_mode = "FullModuleTMR"
# tmr_mode = "LogicTMR"
tmr_voter = "Default"
tmr_voter_safe_mode = true
preserve_module_ports = false
insert_voter_before_ff = false
insert_voter_after_ff = true
tmr_mode_full_module_insert_voter_before_modules = true
tmr_mode_full_module_insert_voter_after_modules = true
clock_port_names = ["clk_i"]
expand_clock = false
reset_port_names = ["rst_ni"]
expand_reset = false
ff_cells = ["DFF", "FDRE"]
additional_ff_cells = ["FDCE"]
excluded_ff_cells = ["FDSE"]
logic_path_1_suffix = "_a"
logic_path_2_suffix = "_b"
logic_path_3_suffix = "_c"


[module_groups]
mod1 = "A"
mod2 = "B"


[groupA]
tmr_mode = "LogicTMR"
insert_voter_before_ff = true

[groupB]
tmr_voter = "Default"
expand_clock = false
