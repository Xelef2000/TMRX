# Global configuration
[global]
# tmr_mode = "FullModuleTMR"
tmr_mode = "LogicTMR"
tmr_voter = "Default"
tmr_voter_safe_mode = false
preserve_module_ports = true
clock_port_names = ["clk_i"]
expand_clock = false
reset_port_names = ["rst_ni"]
expand_reset = false

[global.logic]
insert_voter_before_ff = false
insert_voter_after_ff = true
ff_cells = ["DFF", "FDRE"]
additional_ff_cells = ["FDCE"]
excluded_ff_cells = ["FDSE"]
logic_path_1_suffix = "_a"
logic_path_2_suffix = "_b"
logic_path_3_suffix = "_c"

[global.full_module]
insert_voter_before_modules = true
insert_voter_after_modules = true
insert_voter_on_clock_nets = false
insert_voter_on_reset_nets = false

[module.top]
groups = ["A"]

[module.submodule]
groups = ["B"]
tmr_mode = "FullModuleTMR"
tmr_voter = "Default"
clock_port_names = ["clk_i"]
expand_clock = false
reset_port_names = ["rst_ni"]
expand_reset = false

[module.submodule.logic]
insert_voter_before_ff = false
insert_voter_after_ff = true
ff_cells = ["DFF", "FDRE"]
additional_ff_cells = ["FDCE"]
excluded_ff_cells = ["FDSE"]
logic_path_1_suffix = "_a"
logic_path_2_suffix = "_b"
logic_path_3_suffix = "_c"

[module.submodule.full_module]
insert_voter_before_modules = true
insert_voter_after_modules = true

[specific_module."submodule$top.u_sub"]
tmr_mode = "FullModuleTMR"
tmr_voter = "Default"
tmr_voter_safe_mode = true
preserve_module_ports = false
clock_port_names = ["clk_i"]
expand_clock = false
reset_port_names = ["rst_ni"]
expand_reset = false

[specific_module."submodule$top.u_sub".logic]
insert_voter_before_ff = false
insert_voter_after_ff = true
ff_cells = ["DFF", "FDRE"]
additional_ff_cells = ["FDCE"]
excluded_ff_cells = ["FDSE"]
logic_path_1_suffix = "_a"
logic_path_2_suffix = "_b"
logic_path_3_suffix = "_c"

[specific_module."submodule$top.u_sub".full_module]
insert_voter_before_modules = true
insert_voter_after_modules = true

[group.A]
tmr_voter = "Default"

[group.B]
tmr_voter = "Default"
expand_clock = false
